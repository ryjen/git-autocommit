name: Apply large-context source edit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/large-change-context
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply source edit
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/apply_large_context.py')
          text = path.read_text()
          text = text.replace("old = '''", "old = r'''", 1)
          text = text.replace("new = '''", "new = r'''", 1)
          path.write_text(text)
          PY
          python .github/scripts/apply_large_context.py
      - name: Format and test
        run: |
          cargo fmt --all
          cargo test --all --locked
          cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Commit source change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/main.rs
          git commit -m "fix: distribute large diff context fairly"
          git push
