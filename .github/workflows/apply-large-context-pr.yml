name: Apply large-context source edit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/large-change-context
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply source edit
        run: |
          if ! grep -q 'fn allocate_diff_budgets' src/main.rs; then
            python - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/apply_large_context.py')
          text = path.read_text()
          text = text.replace("old = '''", "old = r'''", 1)
          text = text.replace("new = '''", "new = r'''", 1)
          path.write_text(text)
          PY
            python .github/scripts/apply_large_context.py
          fi
          python - <<'PY'
          from pathlib import Path
          path = Path('src/main.rs')
          text = path.read_text()
          old = r'''        if diff.len() < 320 && !is_low_value_diff(path) {
              if let Some(file_excerpt) = staged_file_excerpt(repo, path, budget.min(2_000)) {
                  if !evidence.is_empty() {
                      evidence.push('\n');
                  }
                  evidence.push_str(&format!("Staged file context:\n{file_excerpt}"));
              }
          }
          '''
          new = r'''        if diff.len() < 320
              && !is_low_value_diff(path)
              && let Some(file_excerpt) = staged_file_excerpt(repo, path, budget.min(2_000))
          {
              if !evidence.is_empty() {
                  evidence.push('\n');
              }
              evidence.push_str(&format!("Staged file context:\n{file_excerpt}"));
          }
          '''
          if old not in text:
              raise SystemExit('clippy block not found')
          path.write_text(text.replace(old, new))
          PY
      - name: Format and capture validation
        run: |
          set +e
          cargo fmt --all > validation.log 2>&1
          fmt_status=$?
          cargo test --all --locked >> validation.log 2>&1
          test_status=$?
          cargo clippy --all-targets --all-features --locked -- -D warnings >> validation.log 2>&1
          clippy_status=$?
          printf '\nfmt=%s test=%s clippy=%s\n' "$fmt_status" "$test_status" "$clippy_status" >> validation.log
          exit 0
      - name: Commit source and validation output
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/main.rs validation.log
          git commit -m "fix: distribute large diff context fairly"
          git push
