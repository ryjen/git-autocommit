name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: git-autocommit

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            binary: git-autocommit
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            binary: git-autocommit
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            use_cross: true
            binary: git-autocommit
          - target: x86_64-apple-darwin
            os: macos-13
            use_cross: false
            binary: git-autocommit
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
            binary: git-autocommit
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            binary: git-autocommit.exe

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.ref }}
          fetch-depth: 1

      - name: Verify checked out tag
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$(git rev-parse '${{ steps.release.outputs.ref }}^{commit}')"

      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${{ steps.release.outputs.tag }}"
          tag_version="${tag_version#v}"
          crate_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n1)"

          if [[ -z "$crate_version" ]]; then
            echo "Unable to read package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "$tag_version" != "$crate_version" ]]; then
            echo "Tag version $tag_version does not match Cargo.toml version $crate_version" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --locked --release --target "${{ matrix.target }}"
          else
            cargo build --locked --release --target "${{ matrix.target }}"
          fi

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          package="${BINARY_NAME}-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${package}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${package}/"
          cp README.md LICENSE "dist/${package}/"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          rm -rf "dist/${package}"

          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${package}.tar.gz" > "${package}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${package}.tar.gz" > "${package}.tar.gz.sha256")
          fi

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.ref }}
          fetch-depth: 1

      - name: Verify tag exists
        shell: bash
        run: git rev-parse "${{ steps.release.outputs.ref }}^{commit}"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" \
              dist/* \
              --verify-tag \
              --generate-notes \
              --title "git-autocommit $tag"
          fi
