name: Apply binary budget review fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/large-change-context' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/large-change-context
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Apply review fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/main.rs')
          text = path.read_text()

          old_alloc = r'''fn allocate_diff_budgets(files: &[String], max_bytes: usize) -> Vec<usize> {
              if files.is_empty() {
                  return Vec::new();
              }
              let weights: Vec<usize> = files.iter().map(|path| diff_weight(path)).collect();
              let total_weight: usize = weights.iter().sum();
              let mut budgets: Vec<usize> = weights
                  .iter()
                  .map(|weight| max_bytes.saturating_mul(*weight) / total_weight)
                  .collect();
              let assigned: usize = budgets.iter().sum();
              for budget in budgets.iter_mut().take(max_bytes.saturating_sub(assigned)) {
                  *budget += 1;
              }
              budgets
          }
          '''
          new_alloc = r'''fn allocate_diff_budgets(files: &[String], binary: &[bool], max_bytes: usize) -> Vec<usize> {
              let weights: Vec<usize> = files
                  .iter()
                  .zip(binary)
                  .map(|(path, binary)| if *binary { 0 } else { diff_weight(path) })
                  .collect();
              let total_weight: usize = weights.iter().sum();
              if total_weight == 0 {
                  return vec![0; files.len()];
              }
              let mut budgets: Vec<usize> = weights
                  .iter()
                  .map(|weight| max_bytes.saturating_mul(*weight) / total_weight)
                  .collect();
              let assigned: usize = budgets.iter().sum();
              let mut remainder = max_bytes.saturating_sub(assigned);
              for (budget, weight) in budgets.iter_mut().zip(&weights) {
                  if remainder == 0 {
                      break;
                  }
                  if *weight > 0 {
                      *budget += 1;
                      remainder -= 1;
                  }
              }
              budgets
          }
          '''
          if old_alloc not in text:
              raise SystemExit('allocation block not found')
          text = text.replace(old_alloc, new_alloc)

          old_context = r'''    let budgets = allocate_diff_budgets(files, max_bytes);
              for (path, budget) in files.iter().zip(budgets) {
                  let diff = repo.git(&[
                      "diff",
                      "--cached",
                      "--no-ext-diff",
                      "--no-color",
                      "--no-renames",
                      "--no-textconv",
                      "--",
                      path,
                  ])?;
                  let binary = diff.contains("Binary files ") || diff.contains("GIT binary patch");
          '''
          new_context = r'''    let diffs: Vec<String> = files
              .iter()
              .map(|path| {
                  repo.git(&[
                      "diff",
                      "--cached",
                      "--no-ext-diff",
                      "--no-color",
                      "--no-renames",
                      "--no-textconv",
                      "--",
                      path,
                  ])
              })
              .collect::<Result<_>>()?;
              let binary: Vec<bool> = diffs
                  .iter()
                  .map(|diff| diff.contains("Binary files ") || diff.contains("GIT binary patch"))
                  .collect();
              let budgets = allocate_diff_budgets(files, &binary, max_bytes);
              for (((path, diff), binary), budget) in files.iter().zip(diffs).zip(binary).zip(budgets) {
          '''
          if old_context not in text:
              raise SystemExit('context block not found')
          text = text.replace(old_context, new_context)

          text = text.replace(
              'let budgets = allocate_diff_budgets(&files, 700);',
              'let budgets = allocate_diff_budgets(&files, &[false, false, false], 700);',
          )
          marker = '''    #[test]
              fn excerpt_preserves_both_ends() {
          '''
          test = '''    #[test]
              fn binary_files_do_not_consume_text_budget() {
                  let files = vec!["asset.png".to_owned(), "src/main.rs".to_owned()];
                  let budgets = allocate_diff_budgets(&files, &[true, false], 1_000);
                  assert_eq!(budgets, vec![0, 1_000]);
              }

          '''
          if marker not in text:
              raise SystemExit('test marker not found')
          text = text.replace(marker, test + marker)
          path.write_text(text)
          PY
      - name: Validate
        run: |
          cargo fmt --all
          cargo test --all --locked
          cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: Commit fix and remove temporary workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/fix-binary-budget.yml
          git add src/main.rs
          git commit -m "fix: redistribute omitted binary diff budget"
          git push
